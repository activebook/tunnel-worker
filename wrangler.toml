# wrangler.toml
name = 'tunnel-worker'
main = "src/worker.ts"
#main = "src/index.ts"
compatibility_date = "2024-04-07"

workers_dev = true
preview_urls = true

[observability]
enabled = true

[[routes]]
pattern = "transfer.ccwu.cc"
custom_domain = true

# Authentication token is KV-bootstrapped on first access to /admin.
# No secrets live here. See src/handlers/admin.ts for the bootstrap flow.

# Distributed Storage for dynamic UUID mutations
[[kv_namespaces]]
binding = "TUNNEL"
id = "f0f69372eef24ff0b604e1c6391038c3"
