name = "tunnel-worker"
#main = "src/worker.ts"
main = "src/index.ts"
compatibility_date = "2024-04-07"

workers_dev = true
preview_urls = true

[observability]
enabled = true

[[routes]]
pattern = "transfer.ccwu.cc"
custom_domain = true

# This defines the execution environment boundaries and routing limits.
# Authentication constraint for the Admin Portal
[vars]
ADMIN_TOKEN = "4ec3007c9d962b91edb6a6da366ff8e2"

# Distributed Storage for dynamic UUID mutations
[[kv_namespaces]]
binding = "TUNNEL"
id = "f0f69372eef24ff0b604e1c6391038c3"
