# wrangler.toml
name = 'tunnel-worker'

# for deploy (build.cjs will pack to index.js)
#main = "dist/index.js"

# for dev (log info to console)
main = "src/worker.ts"

# for test
#main = "src/index.ts"

compatibility_date = "2024-04-07"

workers_dev = true
preview_urls = true

[observability]
enabled = true

[[routes]]
pattern = "transfer.ccwu.cc"
custom_domain = true

# Authentication token is KV-bootstrapped on first access to /admin.
# No secrets live here. See src/handlers/admin.ts for the bootstrap flow.

# Distributed Storage for dynamic UUID mutations
[[kv_namespaces]]
# This name is fixed
binding = "TUNNEL"
# Only use on dev
#id = ""

[triggers]
crons = ["0 */6 * * *"]
