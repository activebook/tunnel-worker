name: Sync Preferred Cloudflare IPs
on:
  schedule:
    - cron: '0 0 * * *' # Execute chronologically at midnight UTC daily
  workflow_dispatch: # Enable manual synthesis via GitHub UI

jobs:
  sync_ips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Architectural Repository
        uses: actions/checkout@v4

      - name: Instantiate Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute Autonomous Crawler & Mutate KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Initiating distributed crawl..."
          IP_JSON=$(node scripts/fetch-ips.mjs)
          
          if [ "$IP_JSON" != "[]" ]; then
            echo "Aggregated IPs: $IP_JSON"
            echo "Authorizing against Cloudflare API..."
            # Utilize Wrangler to natively resolve binding names to API UUIDs
            npx wrangler kv:key put --binding=RELAY "PREFERRED_IPS" "$IP_JSON"
            echo "Distributed matrix successfully synchronized."
          else
            echo "Crawler returned empty dataset. Aborting to preserve cached resilience."
            exit 1
          fi
